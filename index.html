<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drive Video Player</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .wrap { max-width: 920px; margin: 0 auto; }
    .box { margin-bottom: 12px; }
    video { width: 100%; height: auto; }
    input { width: 100%; padding: 10px; font-size: 14px; }
    .hint { color: #444; font-size: 13px; }
  </style>
</head>

<body>
  <div class="wrap">
    <h2>Player (Google Drive → Cloudflare Worker → Plyr)</h2>

    <div class="box">
      <div class="hint">
        Dán FILE_ID Drive vào đây (hoặc mở link dạng <code>?id=FILE_ID</code>).
      </div>
      <input id="fileId" value="1fns6qwzKEIDzTKPKCqOpjIu2Ppq_CzYo" />
    </div>

    <video id="player" playsinline controls preload="metadata"></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.polyfilled.js"></script>
  <script>
    const WORKER_BASE = "https://super-rice-0e66.kieuxuan257.workers.dev";

    const input = document.getElementById("fileId");
    const video = document.getElementById("player");
    const plyr = new Plyr(video);

    function setFromId(id) {
      const clean = (id || "").trim();
      if (!clean) return;

      const src = `${WORKER_BASE}/${encodeURIComponent(clean)}`;

      // set source cho Plyr
      plyr.source = {
        type: "video",
        sources: [{ src, type: "video/mp4" }]
      };

      // update URL để bạn share lại cho người khác
      const u = new URL(location.href);
      u.searchParams.set("id", clean);
      history.replaceState(null, "", u.toString());
    }

    // Lấy id từ query ?id=...
    const params = new URLSearchParams(location.search);
    const idFromUrl = params.get("id");
    if (idFromUrl) input.value = idFromUrl;

    setFromId(input.value);

    input.addEventListener("change", () => setFromId(input.value));
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") setFromId(input.value);
    });
  </script>
</body>
</html>
