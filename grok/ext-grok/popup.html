<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 300px;
        margin: 0;
        padding: 12px;
        font: 13px/1.4 system-ui, sans-serif;
        background: #0c0c0c;
        color: #eaeaea;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 4px;
        color: #7dffb3;
        letter-spacing: 0.02em;
      }
      #meta {
        font: 11px ui-monospace, monospace;
        color: #888;
        margin-bottom: 10px;
      }
      #meta b {
        color: #7dffb3;
      }
      #cd {
        font: 22px/1.2 ui-monospace, monospace;
        color: #ffd400;
        text-align: center;
        min-height: 26px;
        margin: 0 0 8px;
      }
      button {
        width: 100%;
        margin: 0 0 6px;
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        background: #1f6feb;
        color: #fff;
        font: 600 12px/1.3 system-ui, sans-serif;
        text-align: left;
        cursor: pointer;
      }
      button span {
        display: block;
        font: 400 10px/1.2 system-ui, sans-serif;
        opacity: 0.75;
        margin-top: 3px;
      }
      button.sec {
        background: #2a2a2a;
      }
      button.go {
        background: #238636;
      }
      button:disabled {
        opacity: 0.45;
        cursor: wait;
      }
      #log {
        margin-top: 8px;
        padding: 8px;
        background: #161616;
        border-radius: 8px;
        font: 11px/1.45 ui-monospace, monospace;
        white-space: pre-wrap;
        max-height: 140px;
        overflow: auto;
        color: #9f9;
      }
      .row {
        display: flex;
        gap: 6px;
      }
      .row button {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <h1>Grok Edu Reg</h1>
    <div id="meta">bridge · step</div>
    <div id="cd"></div>

    <button id="btn1">
      1 · Tạo mail + mở edu
      <span>API create → 30s → login form inbox</span>
    </button>
    <button id="btn1b" class="sec">
      1b · Dùng mail edu-create.bat
      <span>cần edu-bridge.bat (:3847)</span>
    </button>
    <button id="btn2" class="go">
      2 · Reg xAI
      <span>fill email → OTP → profile · Turnstile tay</span>
    </button>
    <button id="btnFull" class="sec">
      Full 1→2
      <span>một lần chạy hết</span>
    </button>
    <div class="row">
      <button id="btnReset" class="sec">Reset</button>
    </div>

    <div id="log">…</div>
    <script src="popup.js"></script>
  </body>
</html>
